<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainTumor AI | Volumetric 3D Analysis</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-color: #1a1c23;
            --surface-bg: #242731;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-glow: #00d2ff;
            --secondary-glow: #3a7bd5;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .container-fluid {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 0;
        }

        .navbar {
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.75rem 1.5rem;
            flex-shrink: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-content {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        #three-d-container {
            flex: 1;
            background: #000;
            position: relative;
        }

        .side-panel {
            width: 380px;
            background: var(--surface-bg);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .control-group {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .group-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
        }

        .group-title i { margin-right: 0.5rem; }

        .slice-preview {
            width: 100%;
            height: 180px;
            background: #000;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slice-preview img {
            max-width: 100%;
            max-height: 100%;
            transition: transform 0.3s ease;
        }

        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 1rem 0;
        }

        .custom-slider {
            flex: 1;
            background: transparent;
            -webkit-appearance: none;
            appearance: none;
        }

        .custom-slider::-webkit-slider-runnable-track {
            height: 4px;
            background: var(--glass-border);
            border-radius: 2px;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--primary-glow);
            margin-top: -6px;
            cursor: pointer;
        }

        .slider-val {
            min-width: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .btn-action {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .btn-action:hover {
            border-color: var(--primary-glow);
            color: var(--primary-glow);
        }

        .btn-action.active {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--primary-glow);
            color: var(--primary-glow);
        }

        .status-footer {
            background: #0b0e14;
            padding: 0.5rem 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--glass-border);
        }

        .upload-compact {
            display: flex;
            gap: 10px;
        }

        .upload-compact input[type="file"] {
            display: none;
        }

        .btn-upload {
            background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
            border: none;
            color: white;
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
        }

        .btn-home {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-home:hover {
            border-color: var(--primary-glow);
            color: var(--primary-glow);
        }

        .rotate-btn {
            padding: 2px 8px;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .rotate-btn:hover {
            color: var(--primary-glow);
            border-color: var(--primary-glow);
        }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://get.goxtk.com/xtk_edge.js"></script>
</head>
<body>

<div class="container-fluid">
    <nav class="navbar">
        <a class="navbar-brand" href="/">
            BRAINTUMOR AI 3D
        </a>
        <div class="d-flex align-items-center gap-3">
            <div class="upload-compact">
                <form id="nii-upload-form" class="d-flex gap-2">
                    <label for="nii-file" class="btn btn-home m-0" style="cursor: pointer;">
                        <i class="bi bi-folder2-open me-1"></i> Choose .nii
                    </label>
                    <input type="file" id="nii-file" name="file" accept=".nii">
                    <button type="submit" class="btn btn-upload">Analyze 3D</button>
                </form>
            </div>
            <div class="vr mx-2" style="background-color: var(--glass-border); opacity: 0.5;"></div>
            <a href="/" class="btn-home"><i class="bi bi-house-door me-1"></i> Dashboard</a>
        </div>
    </nav>

    <div class="main-content">
        <div id="three-d-container">
            <!-- Overlay Loader -->
            <div id="loader" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); z-index:10; text-align:center;">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
                <p class="mt-3 fw-bold text-primary">Generating Volume Rendering...</p>
            </div>
        </div>

        <div class="side-panel">
            <!-- Axial View -->
            <div class="control-group">
                <div class="group-title">
                    <i class="bi bi-view-list"></i> Axial Plane
                    <div class="ms-auto">
                        <button class="rotate-btn rotate-left" data-target="axial-img">↺</button>
                        <button class="rotate-btn rotate-right" data-target="axial-img">↻</button>
                    </div>
                </div>
                <div class="slice-preview">
                    <img id="axial-img" src="" alt="Axial">
                </div>
                <div class="slider-wrap">
                    <input type="range" class="custom-slider" id="axial-slider" min="0" max="100" value="0">
                    <span id="axial-value" class="slider-val">0</span>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn-action w-100 animate-btn" data-target="axial-slider">Animate</button>
                    <button class="btn-action stop-btn" data-target="axial-slider">Stop</button>
                </div>
            </div>

            <!-- Coronal View -->
            <div class="control-group">
                <div class="group-title">
                    <i class="bi bi-grid-3x2"></i> Coronal Plane
                    <div class="ms-auto">
                        <button class="rotate-btn rotate-left" data-target="coronal-img">↺</button>
                        <button class="rotate-btn rotate-right" data-target="coronal-img">↻</button>
                    </div>
                </div>
                <div class="slice-preview">
                    <img id="coronal-img" src="" alt="Coronal">
                </div>
                <div class="slider-wrap">
                    <input type="range" class="custom-slider" id="coronal-slider" min="0" max="100" value="0">
                    <span id="coronal-value" class="slider-val">0</span>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn-action w-100 animate-btn" data-target="coronal-slider">Animate</button>
                    <button class="btn-action stop-btn" data-target="coronal-slider">Stop</button>
                </div>
            </div>

            <!-- Sagittal View -->
            <div class="control-group">
                <div class="group-title">
                    <i class="bi bi-layout-split"></i> Sagittal Plane
                    <div class="ms-auto">
                        <button class="rotate-btn rotate-left" data-target="sagittal-img">↺</button>
                        <button class="rotate-btn rotate-right" data-target="sagittal-img">↻</button>
                    </div>
                </div>
                <div class="slice-preview">
                    <img id="sagittal-img" src="" alt="Sagittal">
                </div>
                <div class="slider-wrap">
                    <input type="range" class="custom-slider" id="sagittal-slider" min="0" max="100" value="0">
                    <span id="sagittal-value" class="slider-val">0</span>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn-action w-100 animate-btn" data-target="sagittal-slider">Animate</button>
                    <button class="btn-action stop-btn" data-target="sagittal-slider">Stop</button>
                </div>
            </div>
        </div>
    </div>

    <div class="status-footer text-center d-flex justify-content-center">
        <div id="status-text">Research purposes only.</div>
    </div>
</div>

<script>
    $(document).ready(function () {
        const animations = {};
        const rotationDegrees = { 'axial-img': 0, 'coronal-img': 0, 'sagittal-img': 0 };

        function setStatus(msg, isError = false) {
            $("#status-text").text(`System Status: ${msg}`).css("color", isError ? "#ff4444" : "var(--text-muted)");
        }

        // Slider events
        ['axial', 'coronal', 'sagittal'].forEach(axis => {
            $(`#${axis}-slider`).on("input", function() {
                const val = $(this).val();
                $(`#${axis}-value`).text(val);
                updateSlice(axis, val);
            });
        });

        // Rotation handles
        $(".rotate-left, .rotate-right").click(function() {
            const targetId = $(this).data("target");
            const isRight = $(this).hasClass("rotate-right");
            rotationDegrees[targetId] = (rotationDegrees[targetId] + (isRight ? 90 : -90)) % 360;
            $(`#${targetId}`).css("transform", `rotate(${rotationDegrees[targetId]}deg)`);
        });

        // Animation logic
        $(".animate-btn").click(function() {
            const btn = $(this);
            const sliderId = btn.data("target");
            const slider = $("#" + sliderId);
            
            if (animations[sliderId]) clearInterval(animations[sliderId]);
            btn.addClass("active").siblings(".stop-btn").removeClass("active");

            let dir = 1;
            animations[sliderId] = setInterval(() => {
                let val = parseInt(slider.val());
                if (val >= slider.attr("max")) dir = -1;
                else if (val <= slider.attr("min")) dir = 1;
                slider.val(val + dir).trigger("input");
            }, 100);
            setStatus(`Animating ${sliderId.split('-')[0]} view...`);
        });

        $(".stop-btn").click(function() {
            const sliderId = $(this).data("target");
            clearInterval(animations[sliderId]);
            delete animations[sliderId];
            $(this).siblings(".animate-btn").removeClass("active");
            setStatus("Animation stopped");
        });

        // NII Upload
        $("#nii-upload-form").submit(function(e) {
            e.preventDefault();
            const file = $("#nii-file")[0].files[0];
            if (!file) {
                setStatus("Please select a file", true);
                return;
            }

            $("#loader").show();
            setStatus("Uploading and generating slices...");

            const formData = new FormData();
            formData.append("file", file);

            $.ajax({
                url: "/upload_nii",
                type: "POST",
                data: formData,
                processData: false,
                contentType: false,
                success: function(resp) {
                    $("#loader").hide();
                    setStatus("Analysis complete. 3D Model loading...");
                    
                    if (resp.slice_info) {
                        const info = resp.slice_info;
                        Object.keys(info).forEach(axis => {
                            $(`#${axis}-slider`).attr({
                                "min": info[axis].min,
                                "max": info[axis].max,
                                "value": Math.floor((info[axis].min + info[axis].max) / 2)
                            }).trigger("input");
                        });
                    }

                    if (resp.file_path) {
                        load3DModel(resp.file_path);
                    }
                },
                error: (err) => {
                    $("#loader").hide();
                    setStatus(err.responseJSON?.error || "Processing failed", true);
                }
            });
        });

        function load3DModel(path) {
            try {
                $("#three-d-container").empty();
                let r = new X.renderer3D();
                r.container = 'three-d-container';
                r.init();

                let volume = new X.volume();
                volume.file = path;
                r.add(volume);
                r.render();
                
                setStatus("3D Volumetric Model Ready");
            } catch (e) {
                console.error(e);
                setStatus("3D Rendering Error (Check Browser Support)", true);
            }
        }

        function updateSlice(axis, index) {
            $.get(`/get_slice/${axis}/${index}`, (resp) => {
                if (resp.slice_path) $(`#${axis}-img`).attr("src", resp.slice_path);
            });
        }
    });
</script>
</body>
</html>
